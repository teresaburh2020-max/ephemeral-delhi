<section>
<h2>Gallery Archive</h2>

<div>
<button onclick="filter('all')">All</button>
<button onclick="filter('religious')">Religious</button>
<button onclick="filter('social')">Social</button>
<button onclick="filter('political')">Political</button>
</div>

<div class="gallery">

<div class="img-card religious">
<img src="https://images.unsplash.com/photo-1605719125065-3d4c6c2f5c2f">
<div class="overlay">Durga Puja</div>
</div>

<div class="img-card social">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<div class="overlay">Wedding Tent</div>
</div>

<div class="img-card political">
<img src="https://images.unsplash.com/photo-1559027615-cd4628902d4a">
<div class="overlay">Protest Stage</div>
</div>

</div>

</section>

<script>
function filter(category){
let items = document.getElementsByClassName("img-card");

for(let i=0;i<items.length;i++){
items[i].style.display="none";

if(category==="all" || items[i].classList.contains(category)){
items[i].style.display="block";
}
}
}
</script>
